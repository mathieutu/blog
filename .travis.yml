language: node_js
node_js:
  - node
cache:
  yarn: true
  directories:
    - "node_modules"

branches:
  only:
  - master

script:
  - echo "Skipping tests..."

before_deploy:
  - yarn build

deploy:
  provider: pages
  repo: mathieutu/mathieutu.github.io
  target-branch: master
  fqdn: mathieutu.dev
  local-dir: src/.vuepress/dist
  github-token: $GITHUB_TOKEN
  committer-from-gh: true
  skip-cleanup: true
  verbose: true
